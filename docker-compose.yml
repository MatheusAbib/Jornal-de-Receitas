version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: site-receitas-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: receitas
      MYSQL_USER: receitas_user
      MYSQL_PASSWORD: receitas123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Banco:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: site-receitas-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: receitas
      DB_USER: root
      DB_PASSWORD: root123
      PORT: 8080
    ports:
      - "8081:8080"
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data: