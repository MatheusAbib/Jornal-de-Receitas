<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${receita.titulo}">Detalhes da Receita</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link th:href="${faviconUrl}" rel="icon" th:if="${faviconUrl != null}">
  <link rel="stylesheet" href="/css/detalhe.css">
</head>

<body>
    <div class="action-buttons">
      <a href="/pendentes" class="btn btn-secondary" th:if="${!receita.aprovada}">
        <i class="fas fa-clock"></i>
        <span>Receitas Pendentes</span>
      </a>
    </div>
  <div class="main-container">
    <a href="/" class="back-link">
      <i class="fas fa-arrow-left"></i> Voltar para a página inicial
    </a>
    

    <header class="recipe-header">
      <h1 class="recipe-title" th:text="${receita.titulo}">Título da Receita</h1>
    </header>

    <section class="hero-section">
      <div class="recipe-image-wrapper">
        <div class="category-badge" th:classappend="${receita.categoria == T(com.receitas.site_receitas.model.Receita.Categoria).DOCE} ? 'category-doce' : 'category-salgado'">
          <i class="fas fa-cake-candles" th:if="${receita.categoria == T(com.receitas.site_receitas.model.Receita.Categoria).DOCE}"></i>
          <i class="fas fa-pepper-hot" th:if="${receita.categoria != T(com.receitas.site_receitas.model.Receita.Categoria).DOCE}"></i>
          <span th:text="${receita.categoria == T(com.receitas.site_receitas.model.Receita.Categoria).DOCE} ? 'Doce' : 'Salgado'"></span>
        </div>
        
        <img th:if="${receita.imagem != null and (receita.imagem.startsWith('http') or receita.imagem.startsWith('https'))}" 
             th:src="${receita.imagem}" alt="Imagem da receita" class="recipe-image">
        <img th:if="${receita.imagem != null and !(receita.imagem.startsWith('http') or receita.imagem.startsWith('https'))}" 
             th:src="@{'/uploads/' + ${receita.imagem}}" alt="Imagem da receita" class="recipe-image">
        <img th:if="${receita.imagem == null}" src="/default-image.jpg" alt="Imagem padrão" class="recipe-image">
        
        <div class="image-overlay">
          <div class="recipe-status">
            <i class="fas fa-utensils"></i>
            <span th:if="${receita.aprovada}">Receita Aprovada</span>
            <span th:if="${!receita.aprovada}">Aguardando Aprovação</span>
          </div>
        </div>
      </div>

      <div class="info-card">
        <div class="info-card-header">
          <i class="fas fa-info-circle"></i>
          <h2>Informações da Receita</h2>
        </div>
        
        <div class="info-grid">
          <div class="info-item">
            <div class="info-icon"><i class="fas fa-clock"></i></div>
            <div class="info-content">
              <span class="info-label">Tempo de Preparo</span>
              <span class="info-value" th:text="${receita.tempoPreparo}">45 minutos</span>
            </div>
          </div>
          
          <div class="info-item">
            <div class="info-icon"><i class="fas fa-users"></i></div>
            <div class="info-content">
              <span class="info-label">Porções</span>
              <span class="info-value" th:text="${receita.porcoes} + ' porções'">4 porções</span>
            </div>
          </div>
          
          <div class="info-item">
            <div class="info-icon"><i class="fas fa-user-tie"></i></div>
            <div class="info-content">
              <span class="info-label">Chef</span>
              <span class="info-value" th:text="${receita.chefe}">Chef</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="print-button-container">
      <button onclick="window.print()" class="btn print-btn">
        <i class="fas fa-print"></i>
        <span>Imprimir Receita</span>
      </button>
    </div>

    <div class="two-columns">
      <div class="content-section">
        <div class="section-header">
          <div class="section-icon"><i class="fas fa-list-check"></i></div>
          <h2 class="section-title">Ingredientes</h2>
          <div class="section-count" th:text="${ingredientesList.size()} + ' itens'"></div>
        </div>
        
        <div class="ingredients-list">
          <div class="ingredient-item" th:each="ingrediente : ${ingredientesList}">
            <input type="checkbox" class="ingredient-checkbox" th:id="'ing-' + ${ingredienteStat.index}">
            <label class="ingredient-text" th:for="'ing-' + ${ingredienteStat.index}" th:text="${ingrediente}">Ingrediente</label>
          </div>
        </div>
      </div>

      <div class="content-section">
        <div class="section-header">
          <div class="section-icon"><i class="fas fa-mortar-pestle"></i></div>
          <h2 class="section-title">Modo de Preparo</h2>
          <div class="section-count" th:text="${modoPreparoList.size()} + ' passos'"></div>
        </div>
        
        <div class="steps-list">
          <div class="step-item" th:each="passo, iterStat : ${modoPreparoList}">
            <div class="step-number" th:text="${iterStat.index + 1}"></div>
            <div class="step-content" th:text="${passo}">Passo do preparo</div>
          </div>
        </div>
      </div>
    </div>


  </div>

  <script src="/js/detalhe.js"></script>
</body>
</html>
